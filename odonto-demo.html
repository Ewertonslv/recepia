function Tooth({ tooth, fdi, estado, onClick }) {
  const cfg   = ESTADOS[estado] || ESTADOS.higido;
  const lines = Array.isArray(tooth.l) ? tooth.l : [tooth.l];
  return html`
    <g className="tooth-g" onClick=${onClick} role="button" aria-label=${'Dente '+fdi}>
      <path d=${tooth.s} fill=${cfg.fill} stroke="none" />
      <path d=${tooth.o} fill="none" stroke=${cfg.stroke} strokeWidth="0.9" strokeLinejoin="round" className="tooth-outline" />
      ${lines.map((d,i) => html`<path key=${i} d=${d} fill="none" stroke=${cfg.stroke} strokeWidth="0.55" opacity="0.65" strokeLinecap="round" />`)}
      ${estado==='ausente' && html`
        <line x1=${tooth.cx-12} y1="8"  x2=${tooth.cx+12} y2="46" stroke="#9ca3af" strokeWidth="1.2" strokeLinecap="round"/>
        <line x1=${tooth.cx+12} y1="8"  x2=${tooth.cx-12} y2="46" stroke="#9ca3af" strokeWidth="1.2" strokeLinecap="round"/>
      `}
      ${estado==='extracao' && html`
        <line x1=${tooth.cx-10} y1="10" x2=${tooth.cx+10} y2="44" stroke="#c53030" strokeWidth="1.5" strokeLinecap="round"/>
        <line x1=${tooth.cx+10} y1="10" x2=${tooth.cx-10} y2="44" stroke="#c53030" strokeWidth="1.5" strokeLinecap="round"/>
      `}
    </g>
  `;
}

function App() {
  const [estado, setEstado]     = useState(Object.assign({}, INICIAL));
  const [dent,   setDent]       = useState('permanente');
  const [picker, setPicker]     = useState(null);
  const [key,    setKey]        = useState(0);
  const [esel,   setEsel]       = useState('higido');
  const [obs,    setObs]        = useState('');

  const maxT = dent === 'decidua' ? 5 : 8;

  const handleClick = useCallback(function(fdi) {
    const cur = estado[fdi] || { e:'higido', obs:'' };
    setPicker(fdi);
    setEsel(cur.e);
    setObs(cur.obs || '');
  }, [estado]);

  const salvar = useCallback(function() {
    if (!picker) return;
    const next = Object.assign({}, estado);
    next[picker] = { e: esel, obs: obs };
    setEstado(next);
    setPicker(null);
    setKey(function(k){ return k+1; });
  }, [picker, esel, obs, estado]);

  const fechar = useCallback(function() {
    setPicker(null);
    setKey(function(k){ return k+1; });
  }, []);

  const legendaKeys = useMemo(function() {
    const seen = {};
    Object.values(estado).forEach(function(v) { if (v.e !== 'higido') seen[v.e] = true; });
    return Object.keys(seen);
  }, [estado]);

  // Renderiza os 4 quadrantes
  const quadrantElems = Q.map(function(q, qi) {
    const teeth = T.slice(0, maxT);
    return html`
      <g key=${qi} transform=${q.tr}>
        ${teeth.map(function(tooth, ti) {
          const fdi = String(q.base + ti + 1);
          const e   = (estado[fdi] || {}).e || 'higido';
          return html`
            <${Tooth} key=${fdi} tooth=${tooth} fdi=${fdi} estado=${e}
              onClick=${function(){ handleClick(fdi); }} />
          `;
        })}
      </g>
    `;
  });

  // Labels FDI em coordenadas absolutas
  // Q1 (translate 26): labelX = tooth.cx + 26, labelY = 13 (sup)
  // Q2 (mirror 874):   labelX = 874 - tooth.cx, labelY = 13
  // Q3 (mirror 874 + vflip 170): labelX = 874 - tooth.cx, labelY = 177
  // Q4 (translate 26 + vflip 170): labelX = tooth.cx + 26, labelY = 177
  const labels = [];
  T.slice(0, maxT).forEach(function(tooth, ti) {
    const cx = tooth.cx;
    // Q1 & Q4 (left side)
    const xL = cx + 26;
    // Q2 & Q3 (right, mirrored)
    const xR = 874 - cx;
    labels.push({ x:xL, y:13,  fdi: String(10 + ti + 1) });
    labels.push({ x:xR, y:13,  fdi: String(20 + ti + 1) });
    labels.push({ x:xR, y:177, fdi: String(30 + ti + 1) });
    labels.push({ x:xL, y:177, fdi: String(40 + ti + 1) });
  });

  return html`
    <div className="max-w-5xl mx-auto bg-white rounded-2xl shadow p-6">
      <h1 className="text-lg font-semibold text-gray-800 mb-1">Odontograma — Paciente Demo</h1>
      <p className="text-sm text-gray-500 mb-4">Clique num dente para registrar o estado.</p>

      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <button onClick=${function(){ setDent('permanente'); setKey(function(k){return k+1;}); }}
            className=${'btn '+(dent==='permanente'?'btn-primary':'btn-ghost')}>Permanente</button>
          <button onClick=${function(){ setDent('decidua'); setKey(function(k){return k+1;}); }}
            className=${'btn '+(dent==='decidua'?'btn-primary':'btn-ghost')}>Decídua</button>
        </div>
        <button onClick=${function(){ setEstado(Object.assign({},INICIAL)); setDent('permanente'); setKey(function(k){return k+1;}); }}
          className="btn btn-ghost" style=${{ padding:'6px 10px' }}>↺ Resetar</button>
      </div>

      ${legendaKeys.length > 0 ? html`
        <div className="flex flex-wrap gap-2 mb-4">
          ${legendaKeys.map(function(e) {
            const c = ESTADOS[e] || {};
            return html`
              <span key=${e} className="flex items-center gap-1.5 text-[11px] text-gray-600 bg-gray-50 border border-gray-200 rounded-full px-2.5 py-0.5">
                <span style=${{ width:'8px',height:'8px',borderRadius:'50%',display:'inline-block',background:c.stroke||'#999' }}></span>
                ${c.label||e}
              </span>`;
          })}
        </div>
      ` : null}

      <div className="rounded-2xl bg-gray-50 border border-gray-200 p-3 overflow-x-auto">
        <svg key=${key} viewBox="0 0 900 190" style=${{ width:'100%',height:'auto',minWidth:'600px' }}
             xmlns="http://www.w3.org/2000/svg">

          <!-- linha divisória entre arcadas -->
          <line x1="60" y1="94" x2="840" y2="94" stroke="#d1d5db" strokeWidth="0.8" strokeDasharray="4 3"/>
          <!-- divisor central vertical -->
          <line x1="450" y1="8" x2="450" y2="182" stroke="#e5e7eb" strokeWidth="0.8" strokeDasharray="3 3"/>

          <!-- labels laterais -->
          <text x="6"  y="52"  fontSize="7" fill="#9ca3af" fontFamily="ui-sans-serif">Vest.</text>
          <text x="6"  y="142" fontSize="7" fill="#9ca3af" fontFamily="ui-sans-serif">Vest.</text>

          <!-- labels arcadas -->
          <text x="60" y="9"   fontSize="7" fill="#d1d5db" letterSpacing="1" fontFamily="ui-sans-serif">SUPERIOR</text>
          <text x="60" y="188" fontSize="7" fill="#d1d5db" letterSpacing="1" fontFamily="ui-sans-serif">INFERIOR</text>

          <!-- dentes -->
          ${quadrantElems}

          <!-- números FDI -->
          ${labels.map(function(lb) {
            return html`<text key=${lb.fdi} x=${lb.x} y=${lb.y} fontSize="7.5" textAnchor="middle"
              fill="#9ca3af" fontFamily="ui-monospace,monospace">${lb.fdi}</text>`;
          })}
        </svg>
      </div>

      ${picker ? html`
        <div className="fixed inset-0 z-50 flex items-center justify-center"
          style=${{ background:'rgba(0,0,0,0.3)' }}
          onClick=${function(e){ if(e.target===e.currentTarget) fechar(); }}>
          <div className="bg-white rounded-2xl shadow-xl p-5 w-72">
            <div className="flex items-center justify-between mb-3">
              <span className="font-semibold text-gray-800">Dente ${picker}</span>
              <button onClick=${fechar} className="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
            </div>
            <label className="block text-xs text-gray-500 mb-1">Estado</label>
            <select value=${esel} onChange=${function(e){ setEsel(e.target.value); }}
              className="w-full rounded-lg border border-gray-200 text-sm p-2 mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-300">
              ${Object.keys(ESTADOS).map(function(k){
                return html`<option key=${k} value=${k}>${ESTADOS[k].label}</option>`;
              })}
            </select>
            <label className="block text-xs text-gray-500 mb-1">Observação</label>
            <input type="text" value=${obs} onChange=${function(e){ setObs(e.target.value); }}
              placeholder="Ex: cárie proximal mesial"
              className="w-full rounded-lg border border-gray-200 text-sm p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
            <div className="flex gap-2">
              <button onClick=${salvar} className="btn btn-primary flex-1" style=${{ padding:'8px' }}>Salvar</button>
              <button onClick=${fechar} className="btn btn-ghost"           style=${{ padding:'8px 12px' }}>Cancelar</button>
            </div>
          </div>
        </div>
      ` : null}
    </div>
  `;
}

createRoot(document.getElementById('app')).render(html`<${App}/>`);
</script>
</body>
</html>
